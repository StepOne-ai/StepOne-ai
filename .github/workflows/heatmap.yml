name: Refresh contribution heatmap

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python scripts/gen_heatmap.py ${{ github.repository_owner }} assets/heatmap.svg
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/heatmap.svg
          git diff --staged --quiet || git commit -m "chore: refresh contribution heatmap"
          git push
